name: Update Placefile

on:
  schedule:
    - cron: '*/5 * * * *' # Runs every 5 minutes
  workflow_dispatch: # Allows you to run it manually

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        run: python Script.py

      - name: Commit and push changes
        run: |
          git config --global user.name "PlacefileBot"
          git config --global user.email "bot@github.com"
          
          # 1. Stage the new file
          git add CWOP_Full_ObsV1.txt
          
          # 2. Commit it (ignore if there are no actual data changes)
          git commit -m "Update placefile data" || exit 0
          
          # 3. THE FIX: Catch up to GitHub's timeline
          # This pulls recent changes and slides your new commit to the very end
          git pull origin main --rebase
          
          # 4. Push the combined timeline back to GitHub
          git push origin main
